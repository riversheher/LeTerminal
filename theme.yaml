name: "LeTerminal"
description: >
  A basic single page theme for Hugo, designed based on the terminal concept.
  Preserves much of the original terminal style, with autoscrolling text, and a blinking cursor.
  However supports basic features of a personal website such as a images, links, and a contact form
  within the terminal style as close as possible without compromising too much user experience.
tags: ["single page", "terminal", "personal website", "blog", "minimal", "htmx"]
