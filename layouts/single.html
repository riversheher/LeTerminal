{{ define "main" }}
{{/* Regular single page - renders inside baseof for direct URL access */}}
<div class="command-output">
  <div class="prompt-line">
    <span class="prompt">$</span> <span class="command-echo">{{ .Title | lower }}</span>
  </div>
  <div class="output-body">
    {{ .Content }}
    {{ partial "content-meta.html" . }}
  </div>
</div>
{{ end }}
