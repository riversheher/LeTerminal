baseURL: "http://localhost:1313/"
languageCode: "en-us"
title: "Portfolio Terminal"
theme: "TerminalHugo"

params:
  terminalTitle: "terminal@portfolio:~"
  siteName: "Portfolio Terminal"
  siteVersion: "v1.0.0"
  profileName: "John Developer"
  profileSubtitle: "Full Stack Developer | Problem Solver | Tech Enthusiast"
  profileBio: "Building elegant solutions for complex challenges. Passionate about clean code, user experience, and continuous learning."
  profileInitials: "JD"
  profileImage: "images/okabe-profile.jpg"

  commands:
    - name: "help"
      label: "help"
      description: "Show available commands"
    - name: "about"
      label: "about"
      description: "Learn more about me"
    - name: "projects"
      label: "projects"
      description: "View my projects"
    - name: "skills"
      label: "skills"
      description: "See my technical skills"
    - name: "contact"
      label: "contact"
      description: "Get in touch"

  # Colour overrides - override individual dark/light mode colours.
  # Omit entirely to use theme defaults. See theme hugo.yaml for all keys.
  # colors:
  #   dark:
  #     pageBg: "#0a0e1a"
  #   light:
  #     pageBg: "#504945"

  background:
    image: "https://fedoraproject.org/w/uploads/9/98/F44-wallpaper_day_%28small%29.png"
    darkImage: "https://fedoraproject.org/w/uploads/6/68/F44-wallpaper_night_%28small%29.png"
    lightImage: "https://fedoraproject.org/w/uploads/9/98/F44-wallpaper_day_%28small%29.png"

# Output configuration - required for HTMX fragment rendering.
# The 'fragment' outputFormat is defined by the theme; only 'outputs' is needed here.
outputs:
  home:
    - HTML
  page:
    - HTML
    - fragment
